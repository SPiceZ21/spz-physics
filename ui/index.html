<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPiceZ Physics Telemetry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="telemetry-container" class="hidden">
        <div class="glass-panel">
            <div class="header">
                <div class="brand">SPZ <span class="accent">//</span> TELEMETRY</div>
                <div class="page-info">
                    <span id="category-title">VEHICLE DYNAMICS</span>
                    <span id="page-indicator">1/3</span>
                </div>
            </div>

            <!-- PAGE 1: VEHICLE DYNAMICS -->
            <div id="page-1" class="page active">
                <div class="car-layout">
                    <div class="axle front">
                        <div class="wheel" id="wheel-fl">
                            <div class="temp" id="temp-fl">20.0°</div>
                            <div class="tire-status"></div>
                            <div class="susp-track"><div class="susp-fill" id="susp-fl"></div></div>
                        </div>
                        <div class="wheel" id="wheel-fr">
                            <div class="temp" id="temp-fr">20.0°</div>
                            <div class="tire-status"></div>
                            <div class="susp-track"><div class="susp-fill" id="susp-fr"></div></div>
                        </div>
                    </div>
                    
                    <div class="chassis-center">
                        <div class="steer-display">
                            <div class="steer-label">STEER</div>
                            <div class="steer-val" id="steer-val">0°</div>
                        </div>
                    </div>

                    <div class="axle rear">
                        <div class="wheel" id="wheel-rl">
                            <div class="temp" id="temp-rl">20.0°</div>
                            <div class="tire-status"></div>
                            <div class="susp-track"><div class="susp-fill" id="susp-rl"></div></div>
                        </div>
                        <div class="wheel" id="wheel-rr">
                            <div class="temp" id="temp-rr">20.0°</div>
                            <div class="tire-status"></div>
                            <div class="susp-track"><div class="susp-fill" id="susp-rr"></div></div>
                        </div>
                    </div>
                </div>

                <div class="stats-footer">
                    <div class="stat-item">
                        <span class="label">SURFACE GRIP</span>
                        <span class="val" id="surf-grip">100%</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">ROAD WETNESS</span>
                        <span class="val" id="wetness">0%</span>
                    </div>
                </div>
            </div>

            <!-- PAGE 2: ENGINE & POWER -->
            <div id="page-2" class="page hidden">
                <div class="engine-grid">
                    <div class="data-block">
                        <span class="label">GEAR</span>
                        <span class="val large" id="gear-val">N</span>
                    </div>
                    <div class="data-block">
                        <span class="label">RPM</span>
                        <span class="val" id="rpm-val">0</span>
                    </div>
                    <div class="data-block">
                        <span class="label">SPEED</span>
                        <span class="val" id="speed-val">0 <small>MPH</small></span>
                    </div>
                </div>

                <div class="input-meters">
                    <div class="input-row">
                        <span class="label">THR</span>
                        <div class="meter-bg"><div class="meter-fill throttle" id="throttle-bar"></div></div>
                    </div>
                    <div class="input-row">
                        <span class="label">BRK</span>
                        <div class="meter-bg"><div class="meter-fill brake" id="brake-bar"></div></div>
                    </div>
                    <div class="input-row">
                        <span class="label">BST</span>
                        <div class="meter-bg"><div class="meter-fill boost" id="boost-bar"></div></div>
                    </div>
                </div>

                <div class="health-meters">
                    <div class="health-row">
                        <span class="label">ENGINE HP</span>
                        <span class="val" id="engine-hp">1000</span>
                    </div>
                    <div class="health-row">
                        <span class="label">BODY HP</span>
                        <span class="val" id="body-hp">1000</span>
                    </div>
                </div>
            </div>

            <!-- PAGE 3: G-FORCE DYNAMICS -->
            <div id="page-3" class="page hidden">
                <div class="g-meter-container">
                    <div class="g-circle">
                        <div class="g-grid-v"></div>
                        <div class="g-grid-h"></div>
                        <div class="g-ghost-container" id="g-ghost-container"></div>
                        <div class="g-dot" id="g-dot"></div>
                    </div>
                    <div class="g-readout">
                        <div class="g-stat">
                            <span class="label">LAT G</span>
                            <span class="val" id="lat-g">0.00</span>
                        </div>
                        <div class="g-stat">
                            <span class="label">LON G</span>
                            <span class="val" id="lon-g">0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
